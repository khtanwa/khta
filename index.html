<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>My Apps Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    :root {
      color-scheme: dark;
      --bg: #080a12;
      --panel: rgba(255,255,255,0.055);
      --panel-hover: rgba(255,255,255,0.09);
      --border: rgba(226,232,240,0.14);
      --border-strong: rgba(226,232,240,0.24);
      --text: #f8fafc;
      --text-soft: #cbd5e1;
      --text-muted: #a8b3c7;
      --text-dim: #8793a8;
      --accent: #a5b4fc;
      --accent-strong: #c7d2fe;
      --shadow: 0 18px 60px rgba(0,0,0,0.35);
      --radius-lg: 18px;
      --radius-md: 14px;
      --page-pad: clamp(16px, 4vw, 40px);
    }

    * { box-sizing: border-box; }

    html {
      min-width: 320px;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: "Noto Sans Thai", "Google Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    button,
    input {
      font: inherit;
    }

    .portal-wrap {
      background:
        radial-gradient(circle at top center, rgba(99,102,241,0.12), transparent 34rem),
        linear-gradient(180deg, #0a0b14 0%, #090b13 100%);
      min-height: 100svh;
      color: var(--text);
      padding: 0;
      overflow: hidden;
      position: relative;
    }

    .portal-bg-glow {
      position: absolute;
      top: -150px;
      left: 50%;
      transform: translateX(-50%);
      width: min(92vw, 820px);
      height: 460px;
      background: radial-gradient(ellipse, rgba(99,102,241,0.24) 0%, rgba(139,92,246,0.12) 45%, transparent 72%);
      pointer-events: none;
      z-index: 0;
    }

    .portal-header {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: clamp(36px, 8vw, 64px) var(--page-pad) clamp(22px, 5vw, 34px);
    }

    .portal-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: clamp(0.78rem, 0.72rem + 0.2vw, 0.9rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-strong);
      background: rgba(99,102,241,0.14);
      border: 1px solid rgba(165,180,252,0.32);
      border-radius: 999px;
      padding: 7px 16px;
      margin-bottom: clamp(18px, 4vw, 24px);
      max-width: 100%;
      text-wrap: balance;
    }

    .portal-eyebrow span.dot {
      width: 7px;
      height: 7px;
      flex: 0 0 7px;
      background: var(--accent-strong);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(0.72); }
    }

    .portal-title {
      font-size: clamp(2rem, 1.45rem + 3.2vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 1.08;
      margin: 0 0 12px;
      background: linear-gradient(135deg, #ffffff 0%, #dbe4ff 42%, #a5b4fc 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-wrap: balance;
    }

    .portal-subtitle {
      font-size: clamp(1rem, 0.94rem + 0.35vw, 1.2rem);
      color: var(--text-soft);
      font-weight: 400;
      line-height: 1.65;
      margin: 0;
    }

    .search-row {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      width: min(100%, 560px);
      margin: 0 auto clamp(26px, 5vw, 42px);
      padding: 0 var(--page-pad);
    }

    .search-box {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 13px 16px;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      box-shadow: 0 10px 38px rgba(0,0,0,0.16);
    }

    .search-box:focus-within {
      background: rgba(255,255,255,0.09);
      border-color: rgba(165,180,252,0.7);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.16), 0 12px 42px rgba(0,0,0,0.2);
    }

    .search-box i {
      color: var(--text-muted);
      font-size: 1.2rem;
      flex: 0 0 auto;
    }

    .search-box input {
      min-width: 0;
      background: none;
      border: none;
      outline: none;
      font-size: clamp(1rem, 0.96rem + 0.2vw, 1.1rem);
      color: var(--text);
      width: 100%;
    }

    .search-box input::placeholder { color: var(--text-dim); opacity: 1; }

    .portal-section {
      position: relative;
      z-index: 2;
      padding: 0 var(--page-pad) clamp(36px, 7vw, 60px);
      width: min(100%, 1180px);
      margin: 0 auto;
    }

    .filter-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: clamp(18px, 3vw, 24px);
      flex-wrap: wrap;
    }

    .ftab {
      font-size: clamp(0.9rem, 0.85rem + 0.18vw, 1rem);
      line-height: 1.2;
      padding: 9px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.025);
      color: var(--text-soft);
      cursor: pointer;
      transition: color 0.15s, background 0.15s, border-color 0.15s, transform 0.15s;
      min-height: 40px;
    }

    .ftab:hover {
      color: var(--text);
      border-color: var(--border-strong);
      background: rgba(255,255,255,0.065);
    }

    .ftab:focus-visible,
    .app-card:focus-visible {
      outline: 3px solid rgba(165,180,252,0.72);
      outline-offset: 3px;
    }

    .ftab.active {
      background: rgba(99,102,241,0.2);
      border-color: rgba(165,180,252,0.42);
      color: #eef2ff;
    }

    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 230px), 1fr));
      gap: clamp(14px, 2vw, 18px);
    }

    .app-card {
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: clamp(18px, 3vw, 24px);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      min-height: 178px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.12);
    }

    .app-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--card-accent, rgba(165,180,252,0.65)), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .app-card:hover {
      background: var(--panel-hover);
      border-color: var(--border-strong);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .app-card:hover::before { opacity: 1; }

    .app-icon {
      width: clamp(46px, 7vw, 54px);
      height: clamp(46px, 7vw, 54px);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.35rem, 1.15rem + 0.8vw, 1.7rem);
      margin-bottom: 16px;
      flex: 0 0 auto;
    }

    .app-name {
      font-size: clamp(1.03rem, 0.98rem + 0.28vw, 1.18rem);
      font-weight: 700;
      color: var(--text);
      margin: 0 0 8px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .app-desc {
      font-size: clamp(0.9rem, 0.86rem + 0.22vw, 1rem);
      color: var(--text-muted);
      margin: 0 0 18px;
      line-height: 1.7;
      overflow-wrap: anywhere;
    }

    .app-tag {
      display: inline-flex;
      align-items: center;
      align-self: flex-start;
      font-size: clamp(0.78rem, 0.74rem + 0.16vw, 0.86rem);
      line-height: 1.2;
      letter-spacing: 0.03em;
      padding: 5px 10px;
      border-radius: 999px;
      font-weight: 700;
      margin-top: auto;
    }

    .empty-state {
      grid-column: 1 / -1;
      color: var(--text-muted);
      border: 1px dashed var(--border-strong);
      border-radius: var(--radius-lg);
      padding: 28px;
      text-align: center;
      line-height: 1.7;
      font-size: 1rem;
    }

    .tag-blue { background: rgba(59,130,246,0.18); color: #bfdbfe; }
    .tag-purple { background: rgba(139,92,246,0.18); color: #ddd6fe; }
    .tag-green { background: rgba(16,185,129,0.18); color: #bbf7d0; }
    .tag-amber { background: rgba(245,158,11,0.18); color: #fde68a; }
    .tag-red { background: rgba(239,68,68,0.16); color: #fecaca; }
    .tag-cyan { background: rgba(6,182,212,0.18); color: #a5f3fc; }
    .tag-pink { background: rgba(236,72,153,0.16); color: #fbcfe8; }
    .tag-gray { background: rgba(148,163,184,0.16); color: #e2e8f0; }

    .icon-blue { background: rgba(59,130,246,0.16); color: #93c5fd; }
    .icon-purple { background: rgba(139,92,246,0.16); color: #c4b5fd; }
    .icon-green { background: rgba(16,185,129,0.16); color: #86efac; }
    .icon-amber { background: rgba(245,158,11,0.16); color: #fcd34d; }
    .icon-red { background: rgba(239,68,68,0.14); color: #fca5a5; }
    .icon-cyan { background: rgba(6,182,212,0.16); color: #67e8f9; }
    .icon-pink { background: rgba(236,72,153,0.14); color: #f9a8d4; }
    .icon-indigo { background: rgba(99,102,241,0.16); color: #c7d2fe; }

    .footer-bar {
      position: relative;
      z-index: 2;
      border-top: 1px solid rgba(226,232,240,0.1);
      padding: 18px var(--page-pad);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      width: min(100%, 1180px);
      margin: 0 auto;
    }

    .footer-left {
      font-size: clamp(0.85rem, 0.8rem + 0.18vw, 0.95rem);
      color: var(--text-dim);
      line-height: 1.5;
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 13px 6px 7px;
      flex: 0 0 auto;
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.82rem;
      font-weight: 700;
      color: #fff;
    }

    .user-name {
      font-size: clamp(0.86rem, 0.82rem + 0.16vw, 0.95rem);
      color: var(--text-soft);
    }

    @media (min-width: 900px) {
      .apps-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      .portal-wrap { min-height: 100dvh; }
      .portal-header { text-align: left; }
      .portal-title { max-width: 10ch; }
      .filter-tabs {
        flex-wrap: nowrap;
        overflow-x: auto;
        padding-bottom: 8px;
        margin-inline: calc(var(--page-pad) * -1);
        padding-inline: var(--page-pad);
        scroll-snap-type: x proximity;
        -webkit-overflow-scrolling: touch;
      }
      .filter-tabs::-webkit-scrollbar { display: none; }
      .ftab { flex: 0 0 auto; scroll-snap-align: start; }
      .apps-grid { grid-template-columns: 1fr; }
      .app-card { min-height: 0; }
      .footer-bar {
        align-items: flex-start;
        flex-direction: column;
      }
      .user-chip { width: 100%; justify-content: flex-start; }
    }

    @media (max-width: 380px) {
      :root { --page-pad: 14px; }
      .portal-eyebrow { letter-spacing: 0.06em; }
      .search-box { padding-inline: 13px; }
      .app-card { padding: 17px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="portal-wrap">
    <div class="portal-bg-glow"></div>

    <header class="portal-header">
      <div class="portal-eyebrow">
        <span class="dot"></span>
        TCMC Internal Tools
      </div>
      <h1 class="portal-title">My Apps Portal</h1>
      <p class="portal-subtitle">เข้าถึงระบบงานทั้งหมดจากที่นี่</p>
    </header>

    <div class="search-row">
      <div class="search-box">
        <i class="ti ti-search" aria-hidden="true"></i>
        <input type="text" id="searchInput" placeholder="ค้นหาแอป..." oninput="filterApps()" autocomplete="off" aria-label="ค้นหาแอป" />
      </div>
    </div>

    <section class="portal-section" aria-label="รายการแอป">
      <div class="filter-tabs" id="filterTabs" role="tablist" aria-label="หมวดหมู่แอป">
        <button class="ftab active" type="button" onclick="setFilter('all',this)">ทั้งหมด</button>
        <button class="ftab" type="button" onclick="setFilter('Medical',this)">Medical</button>
        <button class="ftab" type="button" onclick="setFilter('Data',this)">Data</button>
        <button class="ftab" type="button" onclick="setFilter('System',this)">System</button>
        <button class="ftab" type="button" onclick="setFilter('Content',this)">Content</button>
      </div>

      <div class="apps-grid" id="appsGrid"></div>
    </section>

    <footer class="footer-bar">
      <span class="footer-left">Thai CaseMix Centre &nbsp;·&nbsp; <span id="appCount">8 apps</span></span>
      <div class="user-chip" aria-label="ผู้ใช้">
        <div class="user-avatar">D</div>
        <span class="user-name">Dream</span>
      </div>
    </footer>
  </div>

  <script>
    const apps = [
      {
        name: "ICD / DRG Search",
        desc: "ค้นหารหัส ICD-10 และ DRG สำหรับ classification",
        icon: "ti-stethoscope",
        iconClass: "icon-blue",
        tag: "Medical",
        tagClass: "tag-blue",
        url: "#"
      },
      {
        name: "CCID Chatbot",
        desc: "ค้นหา CCID จาก 1,710 รายการด้วย fuzzy search",
        icon: "ti-message-chatbot",
        iconClass: "icon-purple",
        tag: "Medical",
        tagClass: "tag-purple",
        url: "#"
      },
      {
        name: "Short URL (/go/)",
        desc: "ย่อ URL และติดตาม click analytics",
        icon: "ti-link",
        iconClass: "icon-cyan",
        tag: "System",
        tagClass: "tag-cyan",
        url: "#"
      },
      {
        name: "CMS Admin",
        desc: "จัดการเนื้อหา gallery และเอกสารดาวน์โหลด",
        icon: "ti-layout-dashboard",
        iconClass: "icon-indigo",
        tag: "System",
        tagClass: "tag-gray",
        url: "#"
      },
      {
        name: "Unit Cost Analytics",
        desc: "วิเคราะห์ต้นทุนต่อหน่วยและ benchmarking",
        icon: "ti-chart-bar",
        iconClass: "icon-green",
        tag: "Data",
        tagClass: "tag-green",
        url: "#"
      },
      {
        name: "Hospital Dataset",
        desc: "ETL pipeline และ DRG classification dataset",
        icon: "ti-database",
        iconClass: "icon-amber",
        tag: "Data",
        tagClass: "tag-amber",
        url: "#"
      },
      {
        name: "PDF Stamper",
        desc: "ประทับตราและจัดการไฟล์ PDF เอกสารราชการ",
        icon: "ti-file-certificate",
        iconClass: "icon-red",
        tag: "System",
        tagClass: "tag-red",
        url: "#"
      },
      {
        name: "BiteBrief Studio",
        desc: "สร้าง script และ metadata สำหรับ short-form video",
        icon: "ti-brand-tiktok",
        iconClass: "icon-pink",
        tag: "Content",
        tagClass: "tag-pink",
        url: "#"
      }
    ];

    let currentFilter = 'all';
    let currentSearch = '';

    function renderApps() {
      const grid = document.getElementById('appsGrid');
      const filtered = apps.filter(a => {
        const matchFilter = currentFilter === 'all' || a.tag === currentFilter;
        const searchText = `${a.name} ${a.desc} ${a.tag}`.toLowerCase();
        const matchSearch = searchText.includes(currentSearch);
        return matchFilter && matchSearch;
      });

      document.getElementById('appCount').textContent = filtered.length + ' apps';

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state">ไม่พบแอปที่ตรงกับการค้นหา</div>';
        return;
      }

      grid.innerHTML = filtered.map(a => `
        <a class="app-card" href="${a.url}" aria-label="เปิด ${a.name}">
          <div class="app-icon ${a.iconClass}"><i class="ti ${a.icon}" aria-hidden="true"></i></div>
          <p class="app-name">${a.name}</p>
          <p class="app-desc">${a.desc}</p>
          <span class="app-tag ${a.tagClass}">${a.tag}</span>
        </a>
      `).join('');
    }

    function setFilter(f, el) {
      currentFilter = f;
      document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      renderApps();
    }

    function filterApps() {
      currentSearch = document.getElementById('searchInput').value.trim().toLowerCase();
      renderApps();
    }

    renderApps();
  </script>
</body>
</html>
