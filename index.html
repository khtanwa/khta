
<style>
  .portal-wrap {
    background: #0a0b14;
    min-height: 100vh;
    font-family: "Google Sans", sans-serif;
    color: #e2e8f0;
    padding: 0;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
  }

  .portal-bg-glow {
    position: absolute;
    top: -120px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(99,102,241,0.18) 0%, rgba(139,92,246,0.08) 45%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .portal-header {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 52px 40px 32px;
  }

  .portal-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #818cf8;
    background: rgba(99,102,241,0.1);
    border: 1px solid rgba(99,102,241,0.25);
    border-radius: 100px;
    padding: 5px 14px;
    margin-bottom: 20px;
  }
  .portal-eyebrow span.dot {
    width: 6px; height: 6px;
    background: #818cf8;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:0.4;transform:scale(0.7)}
  }

  .portal-title {
    font-size: 36px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.15;
    margin: 0 0 10px;
    background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 40%, #a5b4fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-family: "Google Sans", sans-serif;
  }

  .portal-subtitle {
    font-size: 14px;
    color: #64748b;
    font-weight: 400;
    margin: 0;
  }

  .search-row {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 10px;
    max-width: 440px;
    margin: 0 auto 36px;
    padding: 0 32px;
  }
  .search-box {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 10px 16px;
    transition: border-color 0.2s;
  }
  .search-box:focus-within {
    border-color: rgba(99,102,241,0.5);
  }
  .search-box i { color: #64748b; font-size: 16px; }
  .search-box input {
    background: none;
    border: none;
    outline: none;
    font-size: 13px;
    color: #e2e8f0;
    width: 100%;
    font-family: "Google Sans", sans-serif;
  }
  .search-box input::placeholder { color: #475569; }

  .portal-section {
    position: relative;
    z-index: 2;
    padding: 0 32px 48px;
  }

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #475569;
    margin-bottom: 14px;
    padding-left: 2px;
  }

  .apps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 14px;
  }

  .app-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 20px 18px 16px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
    text-decoration: none;
    display: block;
  }
  .app-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--card-accent, rgba(99,102,241,0.4)), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .app-card:hover {
    background: rgba(255,255,255,0.055);
    border-color: rgba(255,255,255,0.14);
    transform: translateY(-2px);
  }
  .app-card:hover::before { opacity: 1; }

  .app-icon {
    width: 42px; height: 42px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    margin-bottom: 14px;
  }

  .app-name {
    font-size: 13px;
    font-weight: 500;
    color: #e2e8f0;
    margin: 0 0 4px;
    line-height: 1.3;
  }
  .app-desc {
    font-size: 11.5px;
    color: #475569;
    margin: 0 0 12px;
    line-height: 1.5;
  }
  .app-tag {
    display: inline-flex;
    align-items: center;
    font-size: 10px;
    letter-spacing: 0.04em;
    padding: 2px 8px;
    border-radius: 100px;
    font-weight: 500;
  }

  .tag-blue { background: rgba(59,130,246,0.12); color: #60a5fa; }
  .tag-purple { background: rgba(139,92,246,0.12); color: #a78bfa; }
  .tag-green { background: rgba(16,185,129,0.12); color: #34d399; }
  .tag-amber { background: rgba(245,158,11,0.12); color: #fbbf24; }
  .tag-red { background: rgba(239,68,68,0.1); color: #f87171; }
  .tag-cyan { background: rgba(6,182,212,0.12); color: #22d3ee; }
  .tag-pink { background: rgba(236,72,153,0.1); color: #f472b6; }
  .tag-gray { background: rgba(148,163,184,0.1); color: #94a3b8; }

  .icon-blue { background: rgba(59,130,246,0.12); color: #60a5fa; }
  .icon-purple { background: rgba(139,92,246,0.12); color: #a78bfa; }
  .icon-green { background: rgba(16,185,129,0.12); color: #34d399; }
  .icon-amber { background: rgba(245,158,11,0.12); color: #fbbf24; }
  .icon-red { background: rgba(239,68,68,0.1); color: #f87171; }
  .icon-cyan { background: rgba(6,182,212,0.12); color: #22d3ee; }
  .icon-pink { background: rgba(236,72,153,0.1); color: #f472b6; }
  .icon-indigo { background: rgba(99,102,241,0.12); color: #818cf8; }

  .footer-bar {
    position: relative;
    z-index: 2;
    border-top: 1px solid rgba(255,255,255,0.05);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-left {
    font-size: 11px;
    color: #334155;
  }
  .user-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 100px;
    padding: 5px 12px 5px 6px;
  }
  .user-avatar {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-weight: 600;
    color: #fff;
  }
  .user-name { font-size: 11.5px; color: #94a3b8; }

  .filter-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .ftab {
    font-size: 11.5px;
    padding: 5px 14px;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.08);
    background: transparent;
    color: #64748b;
    cursor: pointer;
    transition: all 0.15s;
    font-family: "Google Sans", sans-serif;
  }
  .ftab:hover { color: #94a3b8; border-color: rgba(255,255,255,0.14); }
  .ftab.active {
    background: rgba(99,102,241,0.12);
    border-color: rgba(99,102,241,0.3);
    color: #a5b4fc;
  }
</style>

<div class="portal-wrap">
  <div class="portal-bg-glow"></div>

  <header class="portal-header">
    <div class="portal-eyebrow">
      <span class="dot"></span>
      TCMC Internal Tools
    </div>
    <h1 class="portal-title">My Apps Portal</h1>
    <p class="portal-subtitle">เข้าถึงระบบงานทั้งหมดจากที่นี่</p>
  </header>

  <div class="search-row">
    <div class="search-box">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input type="text" id="searchInput" placeholder="ค้นหาแอป..." oninput="filterApps()" />
    </div>
  </div>

  <section class="portal-section">
    <div class="filter-tabs" id="filterTabs">
      <button class="ftab active" onclick="setFilter('all',this)">ทั้งหมด</button>
      <button class="ftab" onclick="setFilter('Medical',this)">Medical</button>
      <button class="ftab" onclick="setFilter('Data',this)">Data</button>
      <button class="ftab" onclick="setFilter('System',this)">System</button>
      <button class="ftab" onclick="setFilter('Content',this)">Content</button>
    </div>

    <div class="apps-grid" id="appsGrid"></div>
  </section>

  <footer class="footer-bar">
    <span class="footer-left">Thai CaseMix Centre &nbsp;·&nbsp; <span id="appCount">8 apps</span></span>
    <div class="user-chip">
      <div class="user-avatar">D</div>
      <span class="user-name">Dream</span>
    </div>
  </footer>
</div>

<script>
const apps = [
  {
    name: "ICD / DRG Search",
    desc: "ค้นหารหัส ICD-10 และ DRG สำหรับ classification",
    icon: "ti-stethoscope",
    iconClass: "icon-blue",
    tag: "Medical",
    tagClass: "tag-blue",
    url: "#"
  },
  {
    name: "CCID Chatbot",
    desc: "ค้นหา CCID จาก 1,710 รายการด้วย fuzzy search",
    icon: "ti-message-chatbot",
    iconClass: "icon-purple",
    tag: "Medical",
    tagClass: "tag-purple",
    url: "#"
  },
  {
    name: "Short URL (/go/)",
    desc: "ย่อ URL และติดตาม click analytics",
    icon: "ti-link",
    iconClass: "icon-cyan",
    tag: "System",
    tagClass: "tag-cyan",
    url: "#"
  },
  {
    name: "CMS Admin",
    desc: "จัดการเนื้อหา gallery และเอกสารดาวน์โหลด",
    icon: "ti-layout-dashboard",
    iconClass: "icon-indigo",
    tag: "System",
    tagClass: "tag-gray",
    url: "#"
  },
  {
    name: "Unit Cost Analytics",
    desc: "วิเคราะห์ต้นทุนต่อหน่วยและ benchmarking",
    icon: "ti-chart-bar",
    iconClass: "icon-green",
    tag: "Data",
    tagClass: "tag-green",
    url: "#"
  },
  {
    name: "Hospital Dataset",
    desc: "ETL pipeline และ DRG classification dataset",
    icon: "ti-database",
    iconClass: "icon-amber",
    tag: "Data",
    tagClass: "tag-amber",
    url: "#"
  },
  {
    name: "PDF Stamper",
    desc: "ประทับตราและจัดการไฟล์ PDF เอกสารราชการ",
    icon: "ti-file-certificate",
    iconClass: "icon-red",
    tag: "System",
    tagClass: "tag-red",
    url: "#"
  },
  {
    name: "BiteBrief Studio",
    desc: "สร้าง script และ metadata สำหรับ short-form video",
    icon: "ti-brand-tiktok",
    iconClass: "icon-pink",
    tag: "Content",
    tagClass: "tag-pink",
    url: "#"
  }
];

let currentFilter = 'all';
let currentSearch = '';

function renderApps() {
  const grid = document.getElementById('appsGrid');
  const filtered = apps.filter(a => {
    const matchFilter = currentFilter === 'all' || a.tag === currentFilter;
    const matchSearch = a.name.toLowerCase().includes(currentSearch) || a.desc.toLowerCase().includes(currentSearch);
    return matchFilter && matchSearch;
  });
  document.getElementById('appCount').textContent = filtered.length + ' apps';
  grid.innerHTML = filtered.map(a => `
    <a class="app-card" href="${a.url}">
      <div class="app-icon ${a.iconClass}"><i class="ti ${a.icon}" aria-hidden="true"></i></div>
      <p class="app-name">${a.name}</p>
      <p class="app-desc">${a.desc}</p>
      <span class="app-tag ${a.tagClass}">${a.tag}</span>
    </a>
  `).join('');
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderApps();
}

function filterApps() {
  currentSearch = document.getElementById('searchInput').value.toLowerCase();
  renderApps();
}

renderApps();
</script>
